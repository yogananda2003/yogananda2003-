<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" width="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,900;1,400&amp;family=JetBrains+Mono:wght@400;600&amp;display=swap');

      .display   { font-family: 'Playfair Display', Georgia, serif; font-weight: 900; fill: #0a0a0a; }
      .italic    { font-family: 'Playfair Display', Georgia, serif; font-weight: 400; font-style: italic; fill: #0a0a0a; }
      .mono      { font-family: 'JetBrains Mono', ui-monospace, monospace; fill: #0a0a0a; letter-spacing: 0.18em; }
      .monoFaint { font-family: 'JetBrains Mono', ui-monospace, monospace; fill: #9a9a9a; letter-spacing: 0.2em; }
      .accent    { fill: #c8102e; }

      @keyframes drawLine { from { stroke-dashoffset: 1200; } to { stroke-dashoffset: 0; } }
      @keyframes fadeRise { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes fadeIn   { from { opacity: 0; } to { opacity: 1; } }
      @keyframes blink    { 0%, 60% { opacity: 1; } 61%, 100% { opacity: 0; } 50% { opacity: 1; } }
      @keyframes slideX   { from { transform: translateX(-40px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
      @keyframes pulse    { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.08); } }
      @keyframes marquee  { from { transform: translateX(0); } to { transform: translateX(-400px); } }

      .rule      { stroke: #0a0a0a; stroke-width: 2; stroke-dasharray: 1200; stroke-dashoffset: 1200; animation: drawLine 1.4s ease-out 0.2s forwards; }
      .ruleThin  { stroke: #0a0a0a; stroke-width: 1; stroke-dasharray: 1200; stroke-dashoffset: 1200; animation: drawLine 1.8s ease-out 0.6s forwards; }

      .rise1 { opacity: 0; animation: fadeRise 0.9s ease-out 0.8s forwards; }
      .rise2 { opacity: 0; animation: fadeRise 0.9s ease-out 1.1s forwards; }
      .rise3 { opacity: 0; animation: fadeRise 0.9s ease-out 1.4s forwards; }
      .rise4 { opacity: 0; animation: fadeRise 0.9s ease-out 1.7s forwards; }
      .rise5 { opacity: 0; animation: fadeRise 0.9s ease-out 2.0s forwards; }

      .slide1 { opacity: 0; animation: slideX 0.9s ease-out 2.2s forwards; }
      .fadeLate { opacity: 0; animation: fadeIn 1.2s ease-out 2.4s forwards; }

      .cursor { animation: blink 1.1s infinite; }
      .dot    { transform-origin: center; transform-box: fill-box; animation: pulse 2.4s ease-in-out infinite; }
    </style>
  </defs>

  <!-- Paper background -->
  <rect width="1200" height="480" fill="#f5f1e8"/>

  <!-- Subtle grain via dots (decorative) -->
  <g opacity="0.04">
    <circle cx="120" cy="80"  r="1" fill="#0a0a0a"/>
    <circle cx="340" cy="160" r="1" fill="#0a0a0a"/>
    <circle cx="780" cy="60"  r="1" fill="#0a0a0a"/>
    <circle cx="1060" cy="200" r="1" fill="#0a0a0a"/>
    <circle cx="220" cy="380" r="1" fill="#0a0a0a"/>
    <circle cx="900" cy="420" r="1" fill="#0a0a0a"/>
  </g>

  <!-- Top nameplate rail -->
  <line x1="60" y1="56" x2="1140" y2="56" class="rule"/>
  <g class="rise1">
    <text x="60"   y="44" class="mono"      font-size="12">VOL. MMXXVI  ·  ISSUE 01</text>
    <text x="600"  y="44" class="mono"      font-size="12" text-anchor="middle">THE YOGANANDA JOURNAL</text>
    <text x="1140" y="44" class="mono"      font-size="12" text-anchor="end">BANGALORE  ·  EST. 2003</text>
  </g>

  <!-- Kicker -->
  <text x="60" y="110" class="mono rise2" font-size="13">— AI  /  GENERATIVE SYSTEMS  /  PYTHON —</text>

  <!-- Giant masthead -->
  <text x="60" y="238" class="display rise3" font-size="148" letter-spacing="-4">YOGANANDA</text>

  <!-- Red accent bar -->
  <rect x="60" y="258" width="0" height="6" class="accent rise4">
    <animate attributeName="width" from="0" to="520" begin="1.7s" dur="0.8s" fill="freeze"/>
  </rect>

  <!-- Tagline italic -->
  <text x="60" y="320" class="italic rise4" font-size="34">building minds, one prompt at a time.</text>

  <!-- Middle rule -->
  <line x1="60" y1="360" x2="1140" y2="360" class="ruleThin"/>

  <!-- Column meta -->
  <g class="rise5">
    <text x="60" y="394" class="monoFaint" font-size="11">THE BUILDER</text>
    <text x="60" y="420" class="display"   font-size="18">Final-Year CSE · Data Science</text>
    <text x="60" y="440" class="italic"    font-size="14">CMR Institute of Technology, 2026</text>
  </g>

  <g class="rise5">
    <text x="460" y="394" class="monoFaint" font-size="11">THE PRACTICE</text>
    <text x="460" y="420" class="display"   font-size="18">LLMs · RAG · Context Eng.</text>
    <text x="460" y="440" class="italic"    font-size="14">Python, LangChain, AWS Bedrock</text>
  </g>

  <g class="rise5">
    <text x="860" y="394" class="monoFaint" font-size="11">THE POSTURE</text>
    <text x="860" y="420" class="display"   font-size="18">Open to opportunities</text>
    <text x="860" y="440" class="italic"    font-size="14">Internships · Full-time · 2026</text>
  </g>

  <!-- Terminal cursor accent, bottom right -->
  <g transform="translate(1100, 100)" class="slide1">
    <rect x="-46" y="-22" width="80" height="32" fill="#0a0a0a"/>
    <text x="-38" y="0" font-family="JetBrains Mono, monospace" font-size="14" fill="#f5f1e8">~ $</text>
    <rect x="10" y="-12" width="10" height="16" fill="#f5f1e8" class="cursor"/>
  </g>

  <!-- Pulse dot marker under red bar -->
  <circle cx="580" cy="261" r="5" class="accent dot fadeLate"/>
</svg>
